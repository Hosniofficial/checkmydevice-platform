services:
  # ── Backend API ───────────────────────────────────────────────
  - type: web
    name: checkmydevice-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: REDIS_URL
        sync: false          # rediss://default:PASSWORD@frank-aphid-129728.upstash.io:6379
      - key: FRONTEND_URL
        value: https://checkmydevice.online
      - key: IMEI_PROVIDER
        value: imeicheck
      - key: IMEICHECK_API_URL
        value: https://alpha.imeicheck.com
      - key: IMEICHECK_API_KEY
        sync: false          # set manually
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: "CheckMyDevice <noreply@checkmydevice.com>"
      - key: SENTRY_DSN
        sync: false

  # ── Frontend Static Site ──────────────────────────────────────
  - type: web
    name: checkmydevice-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /api/*
        destination: https://checkmydevice-api.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
