<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- Fallback title & description for crawlers before JS loads.
       react-helmet-async overrides these per-page at runtime. -->
  <title>CheckMyDevice — فحص الأجهزة المحمولة قبل الشراء</title>
  <meta name="description" content="تحقق من هاتفك قبل الشراء — هل الجهاز مسروق أو مفقود؟ أول منصة عربية لفحص IMEI الأجهزة المحمولة في 15 دولة عربية."/>
  <meta name="keywords" content="فحص IMEI, هاتف مسروق, فحص الجهاز قبل الشراء, CheckMyDevice, هاتف مفقود, تحقق من الجهاز"/>
  <link rel="canonical" href="https://checkmydevice.online/"/>
  <!-- Open Graph fallback -->
  <meta property="og:type"        content="website"/>
  <meta property="og:site_name"   content="CheckMyDevice"/>
  <meta property="og:title"       content="CheckMyDevice — فحص الأجهزة المحمولة قبل الشراء"/>
  <meta property="og:description" content="تحقق من هاتفك قبل الشراء — هل الجهاز مسروق أو مفقود؟ أول منصة عربية لفحص IMEI الأجهزة المحمولة في 15 دولة عربية."/>
  <meta property="og:url"         content="https://checkmydevice.online/"/>
  <meta property="og:image"       content="https://checkmydevice.online/android-chrome-512x512.png"/>
  <meta property="og:locale"      content="ar_EG"/>

  <!-- Favicon & App Icons -->
  <!-- 48x48 listed first — Google SERPs requires ≥48×48 for site icon -->
  <link rel="icon" type="image/png" sizes="48x48"  href="/favicon-48x48.png"/>
  <link rel="icon" type="image/png" sizes="32x32"  href="/favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16"  href="/favicon-16x16.png"/>
  <link rel="shortcut icon" href="/favicon.ico"/>
  <link rel="apple-touch-icon" sizes="180x180"     href="/apple-touch-icon.png"/>
  <link rel="manifest"                             href="/site.webmanifest"/>
  <meta name="theme-color" content="#1B4F9B"/>
  <meta name="msapplication-TileColor" content="#1B4F9B"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
